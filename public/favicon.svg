<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="knobGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a5568" />
      <stop offset="100%" stop-color="#1a202c" />
    </linearGradient>
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3748" />
      <stop offset="100%" stop-color="#171923" />
    </linearGradient>
  </defs>

  <!-- Outer Metallic Base Ring -->
  <circle cx="256" cy="256" r="210" fill="url(#baseGradient)" stroke="#4a5568" stroke-width="6" />
  <circle cx="256" cy="256" r="170" fill="#171923" />

  <!-- Ticks/Indicators on Base -->
  <g stroke="#718096" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="90" x2="256" y2="110" />
    <line x1="376" y1="136" x2="362" y2="152" />
    <line x1="422" y1="256" x2="402" y2="256" />
    <line x1="376" y1="376" x2="362" y2="360" />
    <line x1="256" y1="422" x2="256" y2="402" />
    <line x1="136" y1="376" x2="150" y2="360" />
    <line x1="90" y1="256" x2="110" y2="256" />
    <line x1="136" y1="136" x2="150" y2="152" />
  </g>

  <!-- The Knob Cap -->
  <circle cx="256" cy="256" r="140" fill="url(#knobGradient)" filter="drop-shadow(0px 8px 12px rgba(0,0,0,0.5))" />

  <!-- Active Level Track -->
  <path d="M 156 256 A 100 100 0 1 1 356 256" fill="none" stroke="#00b4d8" stroke-width="14" stroke-linecap="round" />

  <!-- Knob Position Indicator -->
  <rect x="250" y="136" width="12" height="40" rx="6" fill="#fff" />

  <!-- Center Cap -->
  <circle cx="256" cy="256" r="50" fill="#2d3748" stroke="#4a5568" stroke-width="4" />
</svg>
